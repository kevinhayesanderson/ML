Linear equation:
    A linear equation is an equation in which the highest power of the variable is always 1
    
Linear Algebra:
    Study of linear equation
    System of sentences:
        - Complete(Non-singular):
            Unique solution
        - Redundant(Singular):
            Infinite solutions
            Rank:
                Measure of how redundant a system is
        - Contradictory(Singular):
            No solution
    
    System of equations as lines:
